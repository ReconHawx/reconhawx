# Called by release-please after a release, or triggered manually.
name: Docker — build and push to GHCR

on:
  workflow_call:
    inputs:
      version:
        description: "Release version without v prefix (e.g. 0.1.0)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (e.g. 0.1.0). Leave empty for sha+latest only."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build_all: ${{ steps.pick.outputs.build_all }}
      api: ${{ steps.pick.outputs.api }}
      frontend: ${{ steps.pick.outputs.frontend }}
      runner: ${{ steps.pick.outputs.runner }}
      ct_monitor: ${{ steps.pick.outputs.ct_monitor }}
      event_handler: ${{ steps.pick.outputs.event_handler }}
      worker: ${{ steps.pick.outputs.worker }}
      migrations: ${{ steps.pick.outputs.migrations }}
    steps:
      - id: pick
        run: |
          for s in api frontend migrations runner ct_monitor event_handler worker; do
            echo "$s=true" >> "$GITHUB_OUTPUT"
          done
          echo "build_all=true" >> "$GITHUB_OUTPUT"

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Set registry prefix
        id: reg
        run: |
          o=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.prefix }}/api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
      - name: Build and push
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
          APP_VERSION: ${{ inputs.version || 'dev' }}
        run: |
          set -euo pipefail
          chmod +x src/api/build.sh
          ALL=$(printf '%s\n' "${META_TAGS:-}" | grep -E . || true)
          PRIMARY=$(echo "$ALL" | head -1 | sed 's/.*://')
          if [ -z "${PRIMARY:-}" ]; then
            echo "No tag from metadata"
            exit 1
          fi
          REST=$(echo "$ALL" | tail -n +2 | sed 's/.*://' | tr '\n' ' ')
          REST="${REST%"${REST##*[![:space:]]}"}"
          if [ -n "${REST:-}" ]; then
            export IMAGE_EXTRA_TAGS="$REST"
          fi
          cd "${GITHUB_WORKSPACE}/src/api"
          ./build.sh "${REGISTRY_PREFIX}" "linux/amd64" "$PRIMARY"

  build-migrations:
