# Branch pushes: build an image only when files under that component (or this workflow) change.
# Tag push v* / workflow_dispatch: build all images.
name: Docker — build and push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build_all: ${{ steps.pick.outputs.build_all }}
      api: ${{ steps.pick.outputs.api }}
      frontend: ${{ steps.pick.outputs.frontend }}
      runner: ${{ steps.pick.outputs.runner }}
      ct_monitor: ${{ steps.pick.outputs.ct_monitor }}
      event_handler: ${{ steps.pick.outputs.event_handler }}
      worker: ${{ steps.pick.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Branch pushes only (ref_type is not always set reliably; refs/heads/ is explicit).
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        with:
          filters: |
            api:
              - 'src/api/**'
            frontend:
              - 'src/frontend/**'
            runner:
              - 'src/runner/**'
            ct_monitor:
              - 'src/ct-monitor/**'
            event_handler:
              - 'src/event-handler/**'
            worker:
              - 'src/worker/**'

      - id: pick
        run: |
          set -e
          BUILD_ALL=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_ALL=true
          fi
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BUILD_ALL=true
          fi
          echo "build_all=$BUILD_ALL" >> "$GITHUB_OUTPUT"
          if [ "$BUILD_ALL" = "true" ]; then
            for s in api frontend runner ct_monitor event_handler worker; do
              echo "$s=true" >> "$GITHUB_OUTPUT"
            done
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "runner=${{ steps.filter.outputs.runner }}" >> "$GITHUB_OUTPUT"
            echo "ct_monitor=${{ steps.filter.outputs.ct_monitor }}" >> "$GITHUB_OUTPUT"
            echo "event_handler=${{ steps.filter.outputs.event_handler }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Paths filter summary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: |
          echo "Per-service path matches (true = image will build on this push):"
          echo "api=${{ steps.filter.outputs.api }} frontend=${{ steps.filter.outputs.frontend }} runner=${{ steps.filter.outputs.runner }}"
          echo "ct_monitor=${{ steps.filter.outputs.ct_monitor }} event_handler=${{ steps.filter.outputs.event_handler }} worker=${{ steps.filter.outputs.worker }}"

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Set registry prefix
        id: reg
        run: |
          o=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.prefix }}/api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - name: Build and push
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          chmod +x src/api/build.sh
          ALL=$(printf '%s\n' "${META_TAGS:-}" | grep -E . || true)
          PRIMARY=$(echo "$ALL" | head -1 | sed 's/.*://')
          if [ -z "${PRIMARY:-}" ]; then
            echo "No tag from metadata"
            exit 1
          fi
          REST=$(echo "$ALL" | tail -n +2 | sed 's/.*://' | tr '\n' ' ')
          REST="${REST%"${REST##*[![:space:]]}"}"
          if [ -n "${REST:-}" ]; then
            export IMAGE_EXTRA_TAGS="$REST"
          fi
          cd "${GITHUB_WORKSPACE}/src/api"
          ./build.sh "${REGISTRY_PREFIX}" "linux/amd64" "$PRIMARY"

