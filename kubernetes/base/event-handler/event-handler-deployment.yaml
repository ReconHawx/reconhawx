apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-handler
  labels:
    app: event-handler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-handler
  template:
    metadata:
      labels:
        app: event-handler
    spec:
      nodeSelector:
        reconhawx.runner: "true"
      containers:
      - name: event-handler
        image: ghcr.io/reconhawx/reconhawx/event-handler:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: NATS_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: nats.url
        
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: redis.url
        
        - name: INTERNAL_SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: internal-service-secret
              key: token
              optional: true
        
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: api.url
        
        - name: EVENTHANDLER_API_TIMEOUT_SECONDS
          value: "15"
        
        - name: EVENTHANDLER_ENABLE_EVENT_HANDLERS
          value: "true"

        - name: EVENTHANDLER_HTTP_PORT
          value: "8000"
        
        - name: LOG_LEVEL
          value: "DEBUG"

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        # Liveness: HTTP server listening; avoid NATS/Redis flapping (those are readiness)
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /status
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---