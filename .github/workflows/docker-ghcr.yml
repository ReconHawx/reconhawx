          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
