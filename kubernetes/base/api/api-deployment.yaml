apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      nodeSelector:
        reconhawx.runner: "true"
      serviceAccountName: api-sa
      initContainers:
      # Waits until Postgres accepts connections to the app DB (initdb + schema load finished on first boot).
      - name: wait-for-postgresql
        image: postgres:15
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-root-username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-root-password
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: database.name
        command:
        - sh
        - -c
        - |
          set -eu
          echo "Waiting for PostgreSQL postgresql:5432 (database ${DATABASE_NAME})..."
          i=0
          max=150
          while [ "$i" -lt "$max" ]; do
            if pg_isready -h postgresql -p 5432 -U "${POSTGRES_USER}" -d "${DATABASE_NAME}" -t 5; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            i=$((i + 1))
            echo "PostgreSQL not ready yet ($i/$max), sleeping 2s..."
            sleep 2
          done
          echo "Timed out waiting for PostgreSQL after $((max * 2))s"
          exit 1
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      - name: run-migrations
        image: ghcr.io/reconhawx/reconhawx/migrations:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_HOST
          value: "postgresql"
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: database.name
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-root-username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-root-password
        - name: MIGRATIONS_DIR
          value: "/app/src/migrations"
        - name: MIGRATIONS_VERBOSE
          value: "0"
        - name: MIGRATIONS_BASELINE_AUTOMARK
          value: "0"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      containers:
      - name: api
        image: ghcr.io/reconhawx/reconhawx/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          protocol: TCP
        
        env:
        - name: POSTGRES_HOST
          value: "postgresql"
        
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: database.name
        
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-root-username
        
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-root-password
        
        # Kubernetes Configuration
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: kubernetes.namespace

        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: reconhawx-version
              key: APP_VERSION

        - name: RUNNER_SERVICE_ACCOUNT
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: runner.serviceaccount
        
        - name: JOB_TTL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: job.ttl

        # Authentication
        - name: ACCESS_TOKEN_EXPIRE_MINUTES
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: access.token.expire.minutes
        
        - name: REFRESH_TOKEN_EXPIRE_DAYS
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: refresh.token.expire.days

        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: jwt-secret-key
        
        - name: REFRESH_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: refresh-secret-key
        
        - name: INTERNAL_SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: internal-service-secret
              key: token
              optional: true
        
        # Service URLs for runner jobs
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: redis.url
        
        - name: NATS_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: nats.url
        
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: api.url

        - name: API_INTERNAL_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: api.url

        # Typosquat detection configuration
        - name: TYPOSQUAT_CACHE_TTL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: runner.typosquat.cache.ttl
        
        - name: TYPOSQUAT_USE_CACHE
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: runner.typosquat.use.cache
        
        # Logging
        - name: LOG_LEVEL
          value: "INFO"

        # Liveness: process up; no DB/NATS (avoids restart loops on dependency blips)
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3

        # Readiness: dependency-aware /status (503 when DB down by default)
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 6

        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m" 