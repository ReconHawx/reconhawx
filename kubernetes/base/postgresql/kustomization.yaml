apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- postgresql-headless-service.yaml
- postgresql-statefulset.yaml
- postgresql-service.yaml
- postgresql-pvc.yaml

configMapGenerator:
- name: postgresql-init-schema
  files:
  - schema.sql
  - zz-init-admin.sh
  options:
    disableNameSuffixHash: true