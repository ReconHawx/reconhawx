          o=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.prefix }}/migrations
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
      - name: Build and push
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
          APP_VERSION: ${{ inputs.version || 'dev' }}
        run: |
          set -euo pipefail
          chmod +x src/migrations/build.sh
          ALL=$(printf '%s\n' "${META_TAGS:-}" | grep -E . || true)
          PRIMARY=$(echo "$ALL" | head -1 | sed 's/.*://')
          if [ -z "${PRIMARY:-}" ]; then
            echo "No tag from metadata"
            exit 1
          fi
          REST=$(echo "$ALL" | tail -n +2 | sed 's/.*://' | tr '\n' ' ')
          REST="${REST%"${REST##*[![:space:]]}"}"
          if [ -n "${REST:-}" ]; then
            export IMAGE_EXTRA_TAGS="$REST"
          fi
          cd "${GITHUB_WORKSPACE}/src/migrations"
          ./build.sh "${REGISTRY_PREFIX}" "linux/amd64" "$PRIMARY"

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
