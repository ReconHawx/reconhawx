# Kubeconfig for Headlamp when not using -in-cluster: the in-cluster code path leaves AuthInfo empty,
# which makes the UI ask for a token. tokenFile points at the pod's projected SA token (same RBAC as headlamp-admin).
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-kubeconfig
  labels:
    app: headlamp
data:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: kubernetes
        cluster:
          server: https://kubernetes.default.svc
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    contexts:
      - name: main
        context:
          cluster: kubernetes
          user: headlamp-admin
    current-context: main
    users:
      - name: headlamp-admin
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
