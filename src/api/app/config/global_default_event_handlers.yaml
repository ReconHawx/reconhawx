handlers:
  # PhishLabs batch processing for new typosquat findings
  - id: typosquat_phishlabs_batch
    event_type: findings.typosquat_domain.created
    description: Trigger PhishLabs batch job for newly created typosquat findings without incident IDs
    conditions:
      - type: field_value
        field: phishlabs_data
        operator: null_or_empty
    actions:
      - type: phishlabs_batch_trigger
        finding_id_template: "{record_id}"
        api_url: "{api_base_url}"
        api_key: "{internal_api_key}"
        batching:
          max_events: 10
          max_delay_seconds: 120

  # # AI analysis batch for new typosquat findings
