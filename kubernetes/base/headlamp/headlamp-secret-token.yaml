# Long-lived token for Headlamp sign-in (see https://headlamp.dev/docs/latest/installation/in-cluster/).
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin
  labels:
    app: headlamp
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
type: kubernetes.io/service-account-token
