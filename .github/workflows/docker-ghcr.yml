          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
      - name: Build and push
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
