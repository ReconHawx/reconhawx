          fi
          cd "${GITHUB_WORKSPACE}/src/event-handler"
          ./build.sh "${REGISTRY_PREFIX}" "linux/amd64" "$PRIMARY"

  # Native per-arch builds (no QEMU). Uses GitHub default arch labels: linux + x64 | ARM64
  build-worker-amd64:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Set registry prefix
        id: reg
        run: |
          o=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (staging amd64)
        env:
          DOCKER_DEFAULT_PLATFORM: ""
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          APP_VERSION: ${{ inputs.version || 'dev' }}
        run: |
          set -euo pipefail
          unset DOCKER_DEFAULT_PLATFORM || true
          chmod +x src/worker/build.sh
          short="${GITHUB_SHA:0:7}"
          cd "${GITHUB_WORKSPACE}/src/worker"
          ./build.sh "${REGISTRY_PREFIX}" "linux/amd64" "${short}-amd64"

  build-worker-arm64:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: [self-hosted, linux, ARM64]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Set registry prefix
        id: reg
        run: |
          o=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (staging arm64)
        env:
          DOCKER_DEFAULT_PLATFORM: ""
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          APP_VERSION: ${{ inputs.version || 'dev' }}
        run: |
          set -euo pipefail
          unset DOCKER_DEFAULT_PLATFORM || true
          chmod +x src/worker/build.sh
          short="${GITHUB_SHA:0:7}"
          cd "${GITHUB_WORKSPACE}/src/worker"
          ./build.sh "${REGISTRY_PREFIX}" "linux/arm64" "${short}-arm64"

  merge-worker-manifest:
    needs: [build-worker-amd64, build-worker-arm64]
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set registry prefix
        id: reg
        run: |
          o=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${o}/reconhawx" >> "$GITHUB_OUTPUT"
          echo "REGISTRY_PREFIX=ghcr.io/${o}/reconhawx" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.prefix }}/worker
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
      - name: Merge multi-arch manifest
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          short="${GITHUB_SHA:0:7}"
          src_amd="${REGISTRY_PREFIX}/worker:${short}-amd64"
          src_arm="${REGISTRY_PREFIX}/worker:${short}-arm64"
          tag_args=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            tag_args+=( -t "$line" )
          done <<< "$(printf '%s\n' "${META_TAGS:-}" | grep -E . || true)"
          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "No tags from metadata"
            exit 1
          fi
          docker buildx imagetools create "${tag_args[@]}" "$src_amd" "$src_arm"
      - name: Verify worker:latest is a multi-arch manifest
        run: |
          set -euo pipefail
          ref="${REGISTRY_PREFIX}/worker:latest"
          echo "Inspecting ${ref}"
          out=$(docker buildx imagetools inspect "$ref")
          echo "$out"
          echo "$out" | grep -q 'linux/arm64' || { echo "ERROR: ${ref} has no linux/arm64 (not a multi-arch index or arm64 missing)."; exit 1; }
          echo "$out" | grep -q 'linux/amd64' || { echo "ERROR: ${ref} has no linux/amd64."; exit 1; }
