          PRIMARY=$(echo "$ALL" | head -1 | sed 's/.*://')
          if [ -z "${PRIMARY:-}" ]; then
            echo "No tag from metadata"
            exit 1
          fi
          REST=$(echo "$ALL" | tail -n +2 | sed 's/.*://' | tr '\n' ' ')
          REST="${REST%"${REST##*[![:space:]]}"}"
          if [ -n "${REST:-}" ]; then
            export IMAGE_EXTRA_TAGS="$REST"
          fi
          cd "${GITHUB_WORKSPACE}/src/frontend"
          ./build.sh "${REGISTRY_PREFIX}" "linux/amd64" "$PRIMARY"

  build-runner:
