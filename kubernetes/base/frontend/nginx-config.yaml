apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: recon
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        # Large multipart uploads (e.g. admin database restore); align above API DATABASE_RESTORE_MAX_BYTES (default 5 GiB)
        client_max_body_size 6g;

        # Use Kubernetes DNS resolver (dynamically determined)
        resolver DNS_SERVER_PLACEHOLDER valid=30s;
        resolver_timeout 5s;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Health / readiness (JSON; status.json from build, version set in image Dockerfile)
        location = /status {
            rewrite ^ /status.json break;
            default_type application/json;
            add_header Cache-Control "no-store";
        }

        # Use $http_host (not $host) so non-default ports in the client Host header survive the redirect.
        location = /headlamp {
            return 302 $scheme://$http_host/headlamp/;
        }

        # Headlamp Kubernetes UI (proxied from in-cluster Service; Headlamp runs with -base-url=/headlamp)
        location ^~ /headlamp/ {
            set $upstream_headlamp http://headlamp.reconhawx.svc.cluster.local:80;
            proxy_pass $upstream_headlamp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Handle client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            set $upstream_api http://api.reconhawx.svc.cluster.local:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    } 