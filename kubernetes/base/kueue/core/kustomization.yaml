apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kueue flavors, local queues, and API RBAC — reapplied on every kubernetes/base-update/ apply.
# ClusterQueue nominalQuota lives in ../cluster-queues/ so upgrades do not overwrite cluster-sized quotas.
# All resources are under this directory (no ..) so kubectl kustomize load restrictions succeed.
resources:
  - runner-flavor.yaml
  - worker-flavor.yaml
  - api-kueue-clusterqueue-rbac.yaml
  - api-rbac.yaml
  - runner-queue.yaml
  - worker-queue.yaml
  - ai-analysis-queue.yaml
